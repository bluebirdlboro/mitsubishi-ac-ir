<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 280" width="1100" height="280">
  <rect width="1100" height="280" fill="#1a1a2e"/>

  <text x="550" y="25" text-anchor="middle" fill="#e94560" font-size="16" font-weight="bold" font-family="monospace">IR Signal Timing — Mitsubishi Heavy AC (38 kHz Carrier)</text>
  <text x="550" y="45" text-anchor="middle" fill="#888" font-size="11" font-family="monospace">representative symbols, not drawn fully to scale</text>

  <!-- Header symbol -->
  <text x="80" y="80" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold" font-family="monospace">HEADER</text>
  <rect x="20" y="95" width="60" height="50" fill="#e94560" opacity="0.9"/>
  <rect x="80" y="135" width="80" height="10" fill="#4ecca3" opacity="0.9"/>
  <text x="50" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">mark</text>
  <text x="50" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">5950μs</text>
  <text x="120" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">space</text>
  <text x="120" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">7475μs</text>

  <line x1="200" y1="60" x2="200" y2="200" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bit 1 symbol -->
  <text x="290" y="80" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold" font-family="monospace">BIT 1</text>
  <rect x="220" y="95" width="20" height="50" fill="#e94560" opacity="0.9"/>
  <rect x="240" y="135" width="120" height="10" fill="#4ecca3" opacity="0.9"/>
  <text x="230" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">mark</text>
  <text x="230" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">508μs</text>
  <text x="300" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">space</text>
  <text x="300" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">3454μs</text>

  <line x1="390" y1="60" x2="390" y2="200" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Bit 0 symbol -->
  <text x="470" y="80" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold" font-family="monospace">BIT 0</text>
  <rect x="410" y="95" width="20" height="50" fill="#e94560" opacity="0.9"/>
  <rect x="430" y="135" width="70" height="10" fill="#4ecca3" opacity="0.9"/>
  <text x="420" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">mark</text>
  <text x="420" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">508μs</text>
  <text x="475" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">space</text>
  <text x="475" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">1496μs</text>

  <line x1="520" y1="60" x2="520" y2="200" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Payload abbreviation -->
  <text x="690" y="100" text-anchor="middle" fill="#888" font-size="13" font-family="monospace">… × 64 bits (8 bytes, LSB-first) …</text>
  <text x="690" y="125" text-anchor="middle" fill="#888" font-size="12" font-family="monospace">each bit = mark + (long space = 1, short space = 0)</text>
  <line x1="560" y1="140" x2="820" y2="140" stroke="#888" stroke-width="1" stroke-dasharray="2,2"/>
  <text x="690" y="170" text-anchor="middle" fill="#ccc" font-size="12" font-family="monospace">payload</text>

  <line x1="860" y1="60" x2="860" y2="200" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Trailer symbol -->
  <text x="980" y="80" text-anchor="middle" fill="#e94560" font-size="14" font-weight="bold" font-family="monospace">TRAILER</text>
  <rect x="880" y="95" width="20" height="50" fill="#e94560" opacity="0.9"/>
  <rect x="900" y="135" width="180" height="10" fill="#4ecca3" opacity="0.9"/>
  <text x="890" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">mark</text>
  <text x="890" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">508μs</text>
  <text x="990" y="170" text-anchor="middle" fill="#ccc" font-size="13" font-family="monospace">space</text>
  <text x="990" y="188" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="monospace">7422μs</text>

  <!-- Frame note -->
  <text x="550" y="230" text-anchor="middle" fill="#aaa" font-size="13" font-family="monospace">Full frame = HEADER + 8 bytes × 8 bits + TRAILER, sent 3× back-to-back with 50 ms gap</text>

  <!-- Legend -->
  <rect x="320" y="245" width="20" height="14" fill="#e94560" opacity="0.9"/>
  <text x="350" y="257" fill="#ccc" font-size="13" font-family="monospace">Mark (IR LED ON, 38 kHz carrier)</text>
  <rect x="660" y="245" width="20" height="14" fill="#4ecca3" opacity="0.9"/>
  <text x="690" y="257" fill="#ccc" font-size="13" font-family="monospace">Space (IR LED OFF)</text>
</svg>
